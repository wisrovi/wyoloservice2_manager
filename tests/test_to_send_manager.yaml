model: "yolov8n-cls.pt"
type: "yolo"
train:
  batch: -1
  data: /datasets/examples/classification/colorball.v8i.multiclass/
  epochs: 1
  imgsz: 640
  device: 0
# val:
#   conf: 0.01
# test:
#   conf: 0.01
sweeper:
  version: 1
  algorithm: optuna
  direction: maximize
  fitness: "metrics/accuracy_top1"
  study_name: "color_ball_v3"
  tune: true
  sampler: "TPESampler"
  n_trials: 3
  priority: "low"
  search_space:
    model: [ "choice", "yolov8n-cls.pt", "yolov8s-cls.pt", "yolov8m-cls.pt" ]
    train:
      imgsz: [ "choice", 416, 640, 720, 960, 1080 ]
      lr0: [ "loguniform", 1e-5, 1e-2 ]

extras:
  gpu:
    id: 0
    limit: 0.95
metadata:
  content: "This is an image classification experiment."
  author: "William Rodriguez"
  documentation: "This model was trained with 2025 data."

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDarwin Cluster Control Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        :root {
            --primary: #a855f7;
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
        }
        header { border-left: 10px solid var(--primary); padding-left: 1.5rem; }
        .manager-tag { background: var(--primary); color: white; padding: 4px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-left: 15px; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="container">
        <nav style="display: flex; gap: 2rem; padding: 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem;">
            <a href="/" style="color: var(--text-dim); text-decoration: none; font-weight: 600;"><i class="fas fa-home"></i> Home</a>
            <a href="/launcher" style="color: var(--text-dim); text-decoration: none; font-weight: 600;"><i class="fas fa-rocket"></i> Launcher</a>
            <a href="/dashboard" style="color: var(--primary); text-decoration: none; font-weight: 700; border-bottom: 2px solid var(--primary);"><i class="fas fa-chart-line"></i> Cluster Dashboard</a>
        </nav>
        <header>
            <h1><i class="fas fa-microchip" style="color: var(--primary);"></i> Cluster Control Center <span class="manager-tag">GLOBAL MANAGER VIEW</span></h1>
            <div class="header-actions">
                <button id="refreshBtn" class="btn btn-primary">Refresh</button>
                <span id="lastUpdate" class="last-update"></span>
            </div>
        </header>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalStudies">-</div>
                <div class="stat-label">Studies</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTrials">-</div>
                <div class="stat-label">Total Trials</div>
            </div>
            <div class="stat-card stat-success">
                <div class="stat-value" id="completedTrials">-</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card stat-warning">
                <div class="stat-value" id="runningTrials">-</div>
                <div class="stat-label">Running</div>
            </div>
            <div class="stat-card stat-danger">
                <div class="stat-value" id="failedTrials">-</div>
                <div class="stat-label">Failed</div>
            </div>
            <div class="stat-card stat-info">
                <div class="stat-value" id="workerCount">-</div>
                <div class="stat-label">Workers Online</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="studies">Studies</button>
            <button class="tab-btn" data-tab="workers">Workers</button>
            <button class="tab-btn" data-tab="queues">Queues</button>
            <button class="tab-btn" data-tab="tasks">Active Tasks</button>
        </div>

        <div class="tab-content active" id="studies-tab">
            <div class="section-header">
                <h2>Optuna Studies</h2>
            </div>
            <div id="studiesList" class="studies-list">
                <div class="loading">Loading studies...</div>
            </div>
        </div>

        <div class="tab-content" id="workers-tab">
            <div class="section-header">
                <h2>Celery Workers</h2>
            </div>
            <div id="workersList" class="workers-list">
                <div class="loading">Loading workers...</div>
            </div>
        </div>

        <div class="tab-content" id="queues-tab">
            <div class="section-header">
                <h2>Celery Queues</h2>
            </div>
            <div id="queuesList" class="queues-list">
                <div class="loading">Loading queues...</div>
            </div>
        </div>

        <div class="tab-content" id="tasks-tab">
            <div class="section-header">
                <h2>Active Tasks</h2>
            </div>
            <div id="tasksList" class="tasks-list">
                <div class="loading">Loading tasks...</div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>

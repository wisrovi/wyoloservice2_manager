target-version = "py310"
line-length = 120

[lint]
select = [
    "D",
    "E",
    "F",
    "W",
    "I",
    "N",
    "UP",
    "B",
    "A",
    "C4",
    "SIM",
    "RUF",
    "PL",
    "PT",
]
ignore = [
    "PLR0913",
    "PLR2004",
    "PLC0415",
    "RUF006",
    "PLE1142",
    "RUF010",
    "F401",
    "PLR2004",
]

[lint.isort]
known-first-party = ["wredis"]
combine-as-imports = true

[lint.pydocstyle]
convention = "google"

[format]
quote-style = "double"
indent-style = "space"
